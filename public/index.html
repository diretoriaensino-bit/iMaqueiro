<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMaqueiro Pro</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0056b3; --success: #28a745; --light: #f4f7f6; --white: #fff; --dark: #343a40; --warning: #ffc107; --danger: #dc3545; --gray: #6c757d;}
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; user-select: none; }
        .app-shell { width: 100%; min-height: 100vh; display: flex; flex-direction: column; }
        @media (max-width: 900px) { .app-shell { max-width: 450px; margin: 0 auto; background: white; } .dashboard-container { flex-direction: column !important; height: auto !important; } .sidebar-form { width: 100% !important; margin-bottom: 20px; } }
        .screen { display: none; padding: 20px; box-sizing: border-box; flex: 1; flex-direction: column; }
        .active { display: flex; }
        header { background: var(--primary); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .dashboard-container { display: flex; gap: 20px; width: 100%; padding: 20px; box-sizing: border-box; height: calc(100vh - 80px); }
        .sidebar-form { width: 350px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-y: auto; flex-shrink: 0; }
        .main-panel { flex: 1; overflow-y: auto; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: white; border-radius: 12px; padding: 15px; border-left: 8px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; -webkit-appearance: none; appearance: none; }
        .btn-main { background: var(--primary); color: white; width: 100%; }
        input, select { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: white; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 400px; border-radius: 15px; padding: 20px; position: relative; }
        .chat-box { height: 250px; overflow-y: auto; background: #f8f9fa; padding: 10px; border-radius: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 12px; font-size: 0.85rem; max-width: 80%; }
        .msg.meu { align-self: flex-end; background: var(--primary); color: white; }
        .msg.outro { align-self: flex-start; background: #ddd; }
        #call-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1500; color:white; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:20px;}
        #swipe-accept { -webkit-appearance: none; appearance: none; width: 100%; background: transparent; position: absolute; height: 100%; cursor: pointer; outline: none; z-index: 10; }
        #swipe-accept::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 65px; height: 65px; border-radius: 50%; background: var(--success); }
        .toast-notif { position: fixed; top: 20px; right: 20px; background: var(--dark); color: white; padding: 15px; border-radius: 10px; z-index: 2000; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="app-shell">
        <div id="screen-login" class="screen active">
            <div style="text-align:center; background:white; padding:30px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.1); width:100%; max-width:350px; margin: auto;">
                <img src="/logo-hospital.png" style="width:80px; margin-bottom:10px;">
                <h2 style="color:var(--primary); margin:0;">iMaqueiro</h2>
                <input type="email" id="login-email" placeholder="E-mail">
                <input type="password" id="login-senha" placeholder="Senha">
                <button class="btn btn-main" onclick="tentarLogin()">ENTRAR</button>
                <p id="login-msg" style="color:red; font-size:0.8rem;"></p>
            </div>
        </div>

        <div id="screen-nurse" class="screen" style="padding:0;">
            <header>
                <h3 style="margin:0">Painel Enfermagem</h3>
                <div style="display:flex; align-items:center; gap:15px;">
                    <span id="user-name-nurse" style="font-weight:bold"></span>
                    <button class="btn" style="background:#fff3; color:white;" onclick="fazerLogout()">Sair</button>
                </div>
            </header>
            <div class="dashboard-container">
                <div class="sidebar-form">
                    <h3 style="margin:0 0 15px 0">Novo Pedido</h3>
                    <input type="text" id="paciente" placeholder="Nome do Paciente">
                    <input type="text" id="origem" placeholder="Origem">
                    <input type="text" id="destino" placeholder="Destino">
                    <select id="tipo"><option value="Maca">Maca</option><option value="Cadeira de Rodas">Cadeira de Rodas</option><option value="Maca com O2">Maca com O2</option></select>
                    <select id="urgencia"><option value="Verde">Rotina</option><option value="Amarelo">Urgência</option><option value="Vermelho">Emergência</option></select>
                    <select id="trajeto"><option value="ida_volta">Ida e Volta</option><option value="so_ida">Somente Ida</option></select>
                    <select id="risco"><option value="Nenhum">Sem Risco</option><option value="Contato">Isolamento Contato</option><option value="Gotículas">Isolamento Gotículas</option></select>
                    <button class="btn btn-main" onclick="enviarPedido()">SOLICITAR MAQUEIRO</button>
                </div>
                <div class="main-panel"><div class="cards-grid" id="nurse-list"></div></div>
            </div>
        </div>

        <div id="screen-maqueiro" class="screen">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 id="user-name-maq" style="margin:0"></h3>
                <button class="btn" style="background:#eee" onclick="fazerLogout()">Sair</button>
            </div>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <div style="flex:1; background:white; padding:15px; border-radius:10px; text-align:center;">
                    <h2 id="total-hoje" style="margin:0; color:var(--primary);">0</h2><small>Hoje</small>
                </div>
                <div style="flex:1; background:var(--success); color:white; padding:15px; border-radius:10px; text-align:center;">
                    <h2 style="margin:0;">ON</h2><small>Disponível</small>
                </div>
            </div>
            <button class="btn" id="btn-som" onclick="ativarAudio()" style="background:var(--success); color:white; margin-bottom:20px;">🔔 LIGAR ALARME</button>
            <div id="maqueiro-list"></div>
            <h4 style="margin:20px 0 10px 0">Histórico Recente</h4>
            <div id="maqueiro-history"></div>
        </div>
    </div>

    <div id="chat-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Chat de Apoio</h3>
            <div class="chat-box" id="chat-box"></div>
            <div id="quick-replies" style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:15px;"></div>
            <button class="btn" style="width:100%; margin-top:15px; background:#eee" onclick="fecharChat()">Fechar</button>
        </div>
    </div>

    <div id="qr-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Validar Leito</h3>
            <div id="qr-reader" style="width:100%;"></div>
            <button class="btn" style="background:var(--danger); color:white; width:100%; margin-top:15px;" onclick="fecharQR()">Cancelar</button>
        </div>
    </div>

    <div id="call-modal">
        <div id="call-risco" style="background:var(--danger); width:100%; padding:10px; position:absolute; top:0; font-weight:bold; display:none;">⚠️ ISOLAMENTO!</div>
        <h2 id="call-paciente" style="margin:0"></h2>
        <h1 id="call-rota" style="margin:10px 0;"></h1>
        <div style="width:300px; height:70px; background:#333; border-radius:35px; position:relative; display:flex; align-items:center; justify-content:center; margin-top:30px;">
            <span style="color:#666; font-weight:bold;">DESLIZE PARA ACEITAR</span>
            <input type="range" min="0" max="100" value="0" id="swipe-accept">
        </div>
        <button onclick="passarVezCall()" style="background:none; border:none; color:var(--warning); margin-top:30px; font-weight:bold; cursor:pointer;">PASSAR A VEZ</button>
    </div>

    <div id="toast" class="toast-notif" onclick="this.style.display='none'"><b>Chat:</b> <span id="toast-msg"></span></div>

    <audio id="audio-alerta" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" loop></audio>
    <audio id="audio-emergencia" src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3" loop></audio>

    <script>
        const socket = io();
        let usuario, audioLigado = false, pedidosAtivos = [], idChamadoAtual, idChatAtivo, html5QrCode;

        window.onload = () => {
            const salvo = localStorage.getItem('imaqueiro_user');
            if (salvo) {
                usuario = JSON.parse(salvo);
                socket.emit('relogar_maqueiro', usuario);
                abrirPainel(usuario);
            }
        };

        function tentarLogin() {
            socket.emit('fazer_login', { email: document.getElementById('login-email').value, senha: document.getElementById('login-senha').value });
        }

        socket.on('login_sucesso', u => { usuario = u; localStorage.setItem('imaqueiro_user', JSON.stringify(u)); abrirPainel(u); });
        socket.on('login_erro', m => document.getElementById('login-msg').innerText = m);

        function abrirPainel(u) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(u.cargo === 'enfermagem' ? 'screen-nurse' : 'screen-maqueiro').classList.add('active');
            document.getElementById(u.cargo === 'enfermagem' ? 'user-name-nurse' : 'user-name-maq').innerText = u.nome;
            socket.emit('solicitar_lista');
        }

        function fazerLogout() { localStorage.removeItem('imaqueiro_user'); location.reload(); }

        function enviarPedido() {
            const d = { paciente: document.getElementById('paciente').value, origem: document.getElementById('origem').value, destino: document.getElementById('destino').value, tipo: document.getElementById('tipo').value, urgencia: document.getElementById('urgencia').value, trajeto: document.getElementById('trajeto').value, risco_assistencial: document.getElementById('risco').value };
            if(!d.paciente || !d.origem || !d.destino) return alert("Preencha origem e destino!");
            socket.emit('novo_pedido', d);
            document.getElementById('paciente').value = ""; document.getElementById('origem').value = ""; document.getElementById('destino').value = "";
        }

        socket.on('atualizar_lista', data => { pedidosAtivos = data.ativos; renderizar(data.ativos, data.historico); });

        socket.on('notificacao_mensagem', d => {
            if(d.autor !== usuario.nome && idChatAtivo !== d.idPedido) {
                document.getElementById('toast-msg').innerText = `${d.autor}: ${d.texto}`;
                document.getElementById('toast').style.display = 'block';
                setTimeout(() => document.getElementById('toast').style.display='none', 4000);
            }
        });

        function renderizar(ativos, historico) {
            const nList = document.getElementById('nurse-list'), mList = document.getElementById('maqueiro-list'), mHist = document.getElementById('maqueiro-history');
            if(!usuario) return;
            nList.innerHTML = ""; mList.innerHTML = ""; mHist.innerHTML = "";
            let callNow = false; let contHoje = 0;

            ativos.forEach(p => {
                const color = p.urgencia === 'Vermelho' ? 'var(--danger)' : (p.urgencia === 'Amarelo' ? 'var(--warning)' : 'var(--success)');
                const badgeRisco = p.risco_assistencial !== 'Nenhum' ? `<span style="background:red; color:white; font-size:9px; padding:2px 5px; border-radius:5px;">ISOLAMENTO</span>` : "";
                const card = `
                    <div class="card" style="border-left-color:${color}">
                        <div style="display:flex; justify-content:space-between; align-items:start;"><b>${p.origem} ➔ ${p.destino}</b> ${badgeRisco}</div>
                        <div style="font-size:0.9rem; margin:5px 0;">👤 ${p.paciente}</div>
                        <div style="font-size:0.8rem; color:var(--gray);">${p.tipo} | ${p.status.toUpperCase()}</div>
                        <button onclick="abrirChat(${p.id})" style="position:absolute; right:10px; bottom:10px; border:none; background:#f0f0f0; width:30px; height:30px; border-radius:50%;"><i class="fa fa-comment"></i></button>
                    </div>`;

                if(usuario.cargo === 'enfermagem') {
                    nList.innerHTML += `<div>${card}${p.status === 'no_destino' && p.trajeto === 'ida_volta' ? `<button class="btn btn-main" style="margin-top:5px; background:var(--success)" onclick="socket.emit('pedir_retorno', ${p.id})">Pedir Retorno</button>` : ""}</div>`;
                }
                if(usuario.cargo === 'maqueiro') {
                    if((p.status === 'pendente' || p.status === 'aguardando_retorno') && (!p.maqueiro_sugerido || p.maqueiro_sugerido === usuario.nome)) {
                        callNow = true; idChamadoAtual = p.id;
                        document.getElementById('call-paciente').innerText = p.paciente;
                        document.getElementById('call-rota').innerText = p.origem + " ➔ " + p.destino;
                        document.getElementById('call-risco').style.display = (p.risco_assistencial !== 'Nenhum' ? 'block' : 'none');
                        if(audioLigado) p.urgencia === 'Vermelho' ? document.getElementById('audio-emergencia').play() : document.getElementById('audio-alerta').play();
                    }
                    let b = "";
                    if(p.maqueiro_ida === usuario.nome || p.maqueiro_volta === usuario.nome) {
                        if(p.status === 'aceito' || p.status === 'aceito_retorno') b = `<button class="btn btn-main" onclick="abrirQR(${p.id})">Confirmar Leito (QR)</button>`;
                        else if(p.status === 'na_origem') b = `<button class="btn" style="background:var(--warning); width:100%" onclick="socket.emit('iniciar_ida', ${p.id})">Iniciar Trajeto</button>`;
                        else if(p.status === 'em_transito_ida') b = `<button class="btn" style="background:var(--dark); color:white; width:100%" onclick="socket.emit('entregue_destino', ${p.id})">Entregue</button>`;
                    }
                    if(b || p.status === 'pendente') mList.innerHTML += card + b;
                }
            });

            historico.forEach(p => {
                if(p.maqueiro_ida === usuario.nome || p.maqueiro_volta === usuario.nome) {
                    contHoje++;
                    mHist.innerHTML += `<div style="background:white; padding:10px; border-radius:8px; margin-bottom:8px; font-size:0.8rem; border-left:4px solid #ccc;"><b>${p.origem} ➔ ${p.destino}</b> | ${p.paciente}</div>`;
                }
            });
            if(usuario.cargo === 'maqueiro') document.getElementById('total-hoje').innerText = contHoje;
            document.getElementById('call-modal').style.display = callNow ? 'flex' : 'none';
        }

        function abrirChat(id) {
            idChatAtivo = id; const p = pedidosAtivos.find(x => x.id === id);
            const box = document.getElementById('chat-box');
            box.innerHTML = (p.chat_mensagens || []).map(m => `<div class="msg ${m.autor === usuario.nome ? 'meu' : 'outro'}"><b>${m.autor}:</b> ${m.texto}</div>`).join('');
            const fr = usuario.cargo === 'maqueiro' ? ["Caminho livre", "Elevador em manutenção", "Paciente em banho"] : ["Aguarde no local", "Pode vir", "Pronto"];
            document.getElementById('quick-replies').innerHTML = fr.map(f => `<button class="btn" style="border:1px solid var(--primary); background:none; font-size:0.7rem;" onclick="enviarMensagem('${f}')">${f}</button>`).join('');
            document.getElementById('chat-modal').style.display = 'flex';
            box.scrollTop = box.scrollHeight;
        }
        function enviarMensagem(texto) { socket.emit('enviar_mensagem', { idPedido: idChatAtivo, texto, autor: usuario.nome }); fecharChat(); }
        function fecharChat() { document.getElementById('chat-modal').style.display = 'none'; idChatAtivo = null; }

        function abrirQR(id) {
            document.getElementById('qr-modal').style.display = 'flex';
            html5QrCode = new Html5Qrcode("qr-reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => { fecharQR(); socket.emit('cheguei_origem', id); }, () => {});
        }
        function fecharQR() { if(html5QrCode) html5QrCode.stop().then(() => html5QrCode.clear()); document.getElementById('qr-modal').style.display = 'none'; }

        function ativarAudio() { document.getElementById('audio-alerta').play().then(() => { document.getElementById('audio-alerta').pause(); audioLigado = true; document.getElementById('btn-som').style.display='none'; }); }
        document.getElementById('swipe-accept').addEventListener('input', function() { if(this.value > 85) { this.value = 0; pararAlarme(); socket.emit('aceitar_ida', {idPedido: idChamadoAtual, nomeMaqueiro: usuario.nome}); } });
        function passarVezCall() { pararAlarme(); socket.emit('rejeitar_pedido', idChamadoAtual); }
        function pararAlarme() { document.getElementById('audio-alerta').pause(); document.getElementById('audio-emergencia').pause(); }
    </script>
</body>
</html>
