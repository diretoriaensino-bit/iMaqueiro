<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMaqueiro - Hospital Dashboard</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0056b3">

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #0056b3; --success: #28a745; --light: #f4f7f6; --white: #fff; --dark: #343a40; --warning: #ffc107; --danger: #dc3545; --gray: #6c757d;}
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; overflow-x: hidden; color: var(--dark); }

        /* REGRAS DE RESPONSIVIDADE (FIX CELULAR) */
        .app-shell { width: 100%; min-height: 100vh; display: flex; flex-direction: column; transition: all 0.3s; }
        
        /* NO CELULAR: Limita largura e centraliza */
        @media (max-width: 900px) {
            .app-shell { max-width: 450px; margin: 0 auto; box-shadow: 0 0 20px rgba(0,0,0,0.1); background: white; }
            .dashboard-container { flex-direction: column; height: auto !important; padding: 15px; }
            .sidebar-form { width: 100% !important; margin-bottom: 20px; box-shadow: none !important; border: 1px solid #eee; }
            header { padding: 10px 15px !important; }
            header h2 { font-size: 1.1rem; }
            .stats-bar { flex-wrap: wrap; }
            .stat-item { padding: 10px !important; }
        }

        /* NO PC: Dashboard Expandido */
        @media (min-width: 901px) {
            .app-shell { max-width: 100%; margin: 0; }
            .dashboard-container { display: flex; gap: 20px; width: 100%; max-width: 1400px; margin: 0 auto; height: calc(100vh - 120px); padding: 0 20px; }
            .sidebar-form { width: 350px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-y: auto; flex-shrink: 0; }
            .main-panel { flex: 1; background: #eef2f5; padding: 20px; border-radius: 15px; overflow-y: auto; }
        }

        .screen { display: none; padding: 20px; box-sizing: border-box; flex: 1; flex-direction: column; }
        .active { display: flex; }

        /* LOGIN */
        #screen-login { justify-content: center; align-items: center; background: var(--primary); padding: 20px; }
        .login-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 380px; text-align: center;}

        header { background: var(--primary); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: white; border-radius: 12px; padding: 15px; border-left: 8px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
        
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; transition: 0.3s; -webkit-appearance: none; appearance: none; }
        .btn-main { background: var(--primary); color: white; width: 100%; }

        input:not([type="range"]), select { 
            -webkit-appearance: none; -moz-appearance: none; appearance: none; 
            width: 100%; padding: 12px; margin-bottom: 12px; 
            border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: white; font-size: 0.9rem;
        }

        label { font-size: 0.75rem; font-weight: bold; color: var(--gray); display: block; margin-bottom: 3px; }

        .stats-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-item { background: white; padding: 12px; border-radius: 10px; flex: 1; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stat-item h2 { margin: 0; color: var(--primary); font-size: 1.2rem; }
        .stat-item span { font-size: 0.7rem; color: var(--gray); font-weight: bold; text-transform: uppercase; }

        .badge-risco { background: var(--danger); color: white; font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* CHAT */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 400px; border-radius: 15px; padding: 20px; }
        .chat-box { height: 250px; overflow-y: auto; background: #f8f9fa; padding: 10px; border-radius: 10px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 12px; font-size: 0.85rem; max-width: 80%; }
        .msg.meu { align-self: flex-end; background: var(--primary); color: white; }
        .msg.outro { align-self: flex-start; background: #ddd; }

        /* CALL MODAL */
        #call-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000; color:white; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:20px;}
        .pulse { width: 80px; height: 80px; border-radius: 50%; animation: pulse-anim 1.5s infinite; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        @keyframes pulse-anim { 0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.7); } 70% { box-shadow: 0 0 0 20px rgba(255,255,255,0); } 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); } }

        #swipe-accept { -webkit-appearance: none; -moz-appearance: none; appearance: none; width: 100%; background: transparent; position: absolute; height: 100%; cursor: pointer; outline: none; }
        #swipe-accept::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 60px; height: 60px; border-radius: 50%; background: var(--success); }
        #swipe-accept::-moz-range-thumb { -moz-appearance: none; appearance: none; width: 60px; height: 60px; border-radius: 50%; background: var(--success); border: none; }
    </style>
</head>
<body>

    <div class="app-shell">
        
        <div id="screen-login" class="screen active">
            <div class="login-box">
                <img src="/logo-hospital.png" alt="Logo" style="width: 80px; margin-bottom: 10px;">
                <h1 style="margin:0; color:var(--primary); font-size: 1.8rem;">iMaqueiro</h1>
                <p style="color:var(--gray); font-size: 0.9rem; margin-bottom: 20px;">Painel Logístico Hospitalar</p>
                <input type="email" id="login-email" placeholder="E-mail profissional">
                <input type="password" id="login-senha" placeholder="Senha">
                <button class="btn btn-main" onclick="tentarLogin()">ACESSAR</button>
                <p id="login-msg" style="color:red; font-size:0.8rem; margin-top:10px;"></p>
            </div>
        </div>

        <div id="screen-nurse" class="screen" style="padding: 0;">
            <header>
                <div style="display:flex; align-items:center; gap:12px;">
                    <img src="/logo-hospital.png" style="width:35px; filter: brightness(0) invert(1);">
                    <h2 style="margin:0">Enfermagem</h2>
                </div>
                <div style="display:flex; align-items:center; gap:15px;">
                    <span id="user-name-nurse" style="font-weight:bold; font-size: 0.85rem;"></span>
                    <button class="btn" style="background:rgba(255,255,255,0.2); color:white; padding: 5px 10px;" onclick="fazerLogout()">Sair</button>
                </div>
            </header>

            <div class="dashboard-container">
                <div class="sidebar-form">
                    <h3 style="margin-top:0; font-size: 1.1rem;"><i class="fa fa-plus-circle"></i> Novo Pedido</h3>
                    <label>Paciente</label>
                    <input type="text" id="paciente" placeholder="Nome completo">
                    
                    <div style="display:flex; gap:10px;">
                        <div style="flex:1"><label>Origem</label><input type="text" id="origem" placeholder="Ex: UTI 01"></div>
                        <div style="flex:1"><label>Destino</label><input type="text" id="destino" placeholder="Ex: Tomo"></div>
                    </div>

                    <label>Equipamento</label>
                    <select id="tipo">
                        <option value="Maca (Padrão)">Maca (Padrão)</option>
                        <option value="Maca com O2">Maca com O2</option>
                        <option value="Cadeira de Rodas">Cadeira de Rodas</option>
                        <option value="Cadeira com O2">Cadeira com O2</option>
                        <option value="Incubadora">Incubadora</option>
                    </select>

                    <label>Urgência</label>
                    <select id="urgencia">
                        <option value="Verde">Verde (Rotina)</option>
                        <option value="Amarelo">Amarelo (Urgente)</option>
                        <option value="Vermelho">Vermelho (Emergência)</option>
                    </select>

                    <label>Trajeto</label>
                    <select id="trajeto">
                        <option value="ida_volta">Ida e Volta</option>
                        <option value="so_ida">Somente Ida</option>
                    </select>

                    <label>Risco / Isolamento</label>
                    <select id="risco">
                        <option value="Nenhum">Nenhum</option>
                        <option value="Contato">Contato</option>
                        <option value="Gotículas">Gotículas</option>
                        <option value="Aerosol">Aerosol</option>
                    </select>

                    <button class="btn btn-main" style="padding:15px" onclick="enviarPedido()">SOLICITAR AGORA</button>
                </div>

                <div class="main-panel">
                    <div class="stats-bar">
                        <div class="stat-item"><h2 id="stat-pendente">0</h2><span>Aguardando</span></div>
                        <div class="stat-item"><h2 id="stat-curso">0</h2><span>Em curso</span></div>
                        <div class="stat-item"><h2 id="stat-risco" style="color:var(--danger)">0</h2><span>Riscos</span></div>
                    </div>
                    <div class="cards-grid" id="nurse-list"></div>
                </div>
            </div>
        </div>

        <div id="screen-maqueiro" class="screen">
            <div class="user-bar"><span id="user-name-maq" style="font-weight:bold"></span><button onclick="fazerLogout()">Sair</button></div>
            <button class="btn" id="btn-som" onclick="ativarAudio()" style="background:var(--success); color:white; margin-bottom:15px;">🔔 ATIVAR ALERTAS</button>
            <div id="maqueiro-list" style="flex:1; overflow-y:auto;"></div>
        </div>

    </div>

    <div id="chat-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-top:0">Chat Rápido</h3>
            <div class="chat-box" id="chat-box"></div>
            <div id="quick-replies" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;"></div>
            <button class="btn" style="width:100%; margin-top:15px; background:#eee" onclick="fecharChat()">Fechar</button>
        </div>
    </div>

    <div id="call-modal">
        <div id="call-risco-banner" style="background:var(--danger); width:100%; padding:10px; position:absolute; top:0; display:none; font-weight:bold; font-size: 0.9rem;">⚠️ PACIENTE EM ISOLAMENTO!</div>
        <div class="pulse" id="call-icon" style="background:var(--success);"><i class="fa fa-ambulance"></i></div>
        <h2 id="call-paciente" style="margin:0; font-size: 1.4rem;"></h2>
        <h1 id="call-rota" style="margin:10px 0; font-size:2rem;"></h1>
        <div style="width:280px; height:60px; background:#333; border-radius:30px; position:relative; display:flex; align-items:center; justify-content:center; margin-top:30px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);">
            <span style="color:#888; font-weight:bold; font-size: 0.9rem;">Deslize para aceitar ➔</span>
            <input type="range" min="0" max="100" value="0" id="swipe-accept">
        </div>
        <button onclick="passarVezCall()" style="background:none; border:none; color:var(--warning); margin-top:20px; font-weight:bold; font-size:1.1rem; cursor:pointer;">PASSAR A VEZ</button>
    </div>

    <audio id="audio-alerta" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" loop></audio>
    <audio id="audio-emergencia" src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3" loop></audio>

    <script>
        const socket = io();
        let usuario, audioLigado = false, pedidosGlobais = [], idChamadoAtual, idChatAtivo;

        window.onload = function() {
            const salvo = localStorage.getItem('imaqueiro_user');
            if (salvo) {
                usuario = JSON.parse(salvo);
                abrirPainelPosLogin(usuario);
                socket.emit('relogar_maqueiro', usuario);
            }
        };

        function tentarLogin() {
            const email = document.getElementById('login-email').value;
            const senha = document.getElementById('login-senha').value;
            socket.emit('fazer_login', { email, senha });
        }

        socket.on('login_sucesso', u => {
            usuario = u;
            localStorage.setItem('imaqueiro_user', JSON.stringify(u));
            abrirPainelPosLogin(u);
        });

        function abrirPainelPosLogin(u) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(u.cargo === 'enfermagem' ? 'screen-nurse' : 'screen-maqueiro').classList.add('active');
            const nameEl = document.getElementById(u.cargo === 'enfermagem' ? 'user-name-nurse' : 'user-name-maq');
            if(nameEl) nameEl.innerText = u.nome;
            socket.emit('solicitar_lista');
        }

        function fazerLogout() {
            localStorage.removeItem('imaqueiro_user');
            location.reload();
        }

        socket.on('login_erro', m => document.getElementById('login-msg').innerText = m);

        function enviarPedido() {
            const d = {
                paciente: document.getElementById('paciente').value,
                origem: document.getElementById('origem').value,
                destino: document.getElementById('destino').value,
                tipo: document.getElementById('tipo').value,
                urgencia: document.getElementById('urgencia').value,
                trajeto: document.getElementById('trajeto').value,
                risco_assistencial: document.getElementById('risco').value
            };
            if(!d.paciente || !d.origem || !d.destino) return alert("Preencha todos os campos!");
            socket.emit('novo_pedido', d);
            document.getElementById('paciente').value = ""; document.getElementById('origem').value = ""; document.getElementById('destino').value = "";
        }

        socket.on('atualizar_lista', l => { pedidosGlobais = l; renderizarPedidos(); });

        function renderizarPedidos() {
            const nList = document.getElementById('nurse-list'), mList = document.getElementById('maqueiro-list');
            if(!usuario) return;
            nList.innerHTML = ""; mList.innerHTML = "";
            let cPendente = 0, cCurso = 0, cRisco = 0, callNow = false;

            pedidosGlobais.forEach(p => {
                const color = p.urgencia === 'Vermelho' ? 'var(--danger)' : (p.urgencia === 'Amarelo' ? 'var(--warning)' : 'var(--success)');
                const badgeRisco = p.risco_assistencial !== 'Nenhum' ? `<span class="badge-risco">${p.risco_assistencial}</span>` : "";
                if(p.risco_assistencial !== 'Nenhum') cRisco++;
                if(p.status === 'pendente') cPendente++; else cCurso++;

                const cardHtml = `
                    <div class="card" style="border-left-color:${color}">
                        <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:8px;">
                            <b style="font-size:0.95rem">${p.origem} ➔ ${p.destino}</b>
                            ${badgeRisco}
                        </div>
                        <div style="font-size:0.9rem; margin-bottom:5px;">👤 <b>${p.paciente}</b></div>
                        <div style="font-size:0.75rem; margin-bottom:3px; color: #555;">🚑 ${p.tipo}</div>
                        <div style="font-size:0.8rem; color:var(--gray);">Status: <b style="color:var(--primary)">${p.status.toUpperCase().replace(/_/g, ' ')}</b></div>
                        <div style="font-size:0.75rem; color:var(--gray); margin-top:5px;">Maqueiro: ${p.maqueiro_ida || '---'}</div>
                        <button onclick="abrirChat(${p.id})" style="position:absolute; right:10px; bottom:10px; border:none; background:#f0f0f0; border-radius:50%; width:30px; height:30px; cursor:pointer;"><i class="fa fa-comment"></i></button>
                    </div>
                `;

                if(usuario.cargo === 'enfermagem') {
                    nList.innerHTML += `<div>${cardHtml}${p.status === 'no_destino' ? `<button class="btn btn-main" style="margin-top:5px; background:var(--success); font-size: 0.8rem; padding: 8px;" onclick="socket.emit('pedir_retorno', ${p.id})">RETORNO</button>` : ""}</div>`;
                }

                if(usuario.cargo === 'maqueiro') {
                    if((p.status === 'pendente' || p.status === 'aguardando_retorno') && (!p.maqueiro_sugerido || p.maqueiro_sugerido === usuario.nome)) {
                        callNow = true; idChamadoAtual = p.id;
                        document.getElementById('call-paciente').innerText = p.paciente;
                        document.getElementById('call-rota').innerText = p.origem + " ➔ " + p.destino;
                        document.getElementById('call-risco-banner').style.display = (p.risco_assistencial !== 'Nenhum' ? 'block' : 'none');
                        if(audioLigado) p.urgencia === 'Vermelho' ? document.getElementById('audio-emergencia').play() : document.getElementById('audio-alerta').play();
                    }
                    let btn = "";
                    if(p.maqueiro_ida === usuario.nome || p.maqueiro_volta === usuario.nome) {
                        if(p.status === 'aceito') btn = `<button class="btn btn-main" onclick="socket.emit('cheguei_origem', ${p.id})">Cheguei na Origem</button>`;
                        if(p.status === 'na_origem') btn = `<button class="btn" style="background:var(--warning); width:100%" onclick="socket.emit('iniciar_ida', ${p.id})">Sair com Paciente</button>`;
                        if(p.status === 'em_transito_ida') btn = `<button class="btn" style="background:var(--dark); color:white; width:100%" onclick="socket.emit('entregue_destino', ${p.id})">Entregue no Destino</button>`;
                        if(p.status === 'aceito_retorno') btn = `<button class="btn btn-main" onclick="socket.emit('finalizar_geral', ${p.id})">Finalizar Volta</button>`;
                    }
                    if(btn || p.status === 'pendente' || p.status === 'aguardando_retorno') mList.innerHTML += cardHtml + btn;
                }
            });

            if(usuario.cargo === 'enfermagem') {
                document.getElementById('stat-pendente').innerText = cPendente;
                document.getElementById('stat-curso').innerText = cCurso;
                document.getElementById('stat-risco').innerText = cRisco;
            }
            document.getElementById('call-modal').style.display = callNow ? 'flex' : 'none';
        }

        function abrirChat(id) {
            idChatAtivo = id;
            const p = pedidosGlobais.find(x => x.id === id);
            const box = document.getElementById('chat-box');
            box.innerHTML = (p.chat_mensagens || []).map(m => `<div class="msg ${m.autor === usuario.nome ? 'meu' : 'outro'}"><b>${m.autor}:</b> ${m.texto}</div>`).join('');
            const frases = usuario.cargo === 'maqueiro' ? ["Estou indo!", "Elevador cheio", "Paciente não pronto"] : ["Pode vir", "Aguarde 5 min", "Urgente!"];
            document.getElementById('quick-replies').innerHTML = frases.map(f => `<button class="btn" style="border:1px solid var(--primary); background:none; font-size:0.7rem;" onclick="enviarMensagem('${f}')">${f}</button>`).join('');
            document.getElementById('chat-modal').style.display = 'flex';
        }

        function enviarMensagem(texto) {
            socket.emit('enviar_mensagem', { idPedido: idChatAtivo, texto, autor: usuario.nome });
            fecharChat();
        }
        function fecharChat() { document.getElementById('chat-modal').style.display = 'none'; }
        function ativarAudio() { document.getElementById('audio-alerta').play().then(() => { document.getElementById('audio-alerta').pause(); audioLigado = true; document.getElementById('btn-som').style.display='none'; }); }
        document.getElementById('swipe-accept').addEventListener('input', function() { if(this.value > 85) { this.value = 0; aceitarChamadoCall(); } });
        function aceitarChamadoCall() { pararAlarme(); socket.emit('aceitar_ida', {idPedido: idChamadoAtual, nomeMaqueiro: usuario.nome}); }
        function passarVezCall() { pararAlarme(); socket.emit('rejeitar_pedido', idChamadoAtual); }
        function pararAlarme() { document.getElementById('audio-alerta').pause(); document.getElementById('audio-emergencia').pause(); }
    </script>
</body>
</html>
